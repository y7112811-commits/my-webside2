<html lang="en">
<head>

    <style>
        :root {
            --bg-dark: #0F172A;
            --primary: #FF4081;
            --secondary: #7C3AED;
            --accent: #06B6D4;
            --glass-bg: rgba(0, 0, 0, 0.4);
            --text-light: #E2E8F0;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body { 
            background: var(--bg-dark);
            background-image: radial-gradient(circle at 15% 50%, rgba(124, 58, 237, 0.15), transparent 25%),
                              radial-gradient(circle at 85% 30%, rgba(255, 64, 129, 0.15), transparent 25%);
            color: var(--text-light); 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* --- THE WATERMARK --- */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-35deg);
            font-size: 18vw;
            font-weight: 900;
            color: rgba(255, 64, 129, 0.04); 
            pointer-events: none; 
            z-index: -1; 
            user-select: none;
            white-space: nowrap;
        }

        /* Glassmorphism Container */
        .glass-container {
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 64, 129, 0.05);
            position: relative;
            z-index: 1;
        }

        /* Headers & Inputs */
        h2 {
            text-align: center;
            font-size: 26px;
            font-weight: 800;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 20px 0;
        }

        input[type="text"] { 
            padding: 14px; 
            width: 100%; 
            border-radius: 12px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            background: rgba(0, 0, 0, 0.5); 
            color: #fff; 
            font-size: 15px;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 64, 129, 0.3);
            outline: none;
        }

        .primary-btn { 
            padding: 14px;
            width: 100%;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            color: white; 
            font-weight: bold; 
            font-size: 15px;
            cursor: pointer; 
            box-shadow: 0 4px 15px rgba(255, 64, 129, 0.4);
            transition: transform 0.2s;
        }
        .primary-btn:hover { transform: translateY(-2px); }

        /* Active Chat Header (Avatar & Status) */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 15px;
        }
        
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            position: relative;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: #10B981;
            border: 2px solid var(--bg-dark);
            border-radius: 50%;
            position: absolute;
            bottom: 0;
            right: 0;
            animation: pulse-green 2s infinite;
        }

        .status-dot.offline {
            background: #EF4444; 
            animation: none; 
            box-shadow: none;
        }

        @keyframes pulse-green {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .conn-quality {
            font-size: 11px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* Chat Box & Messages */
        #chat-box { 
            height: 350px; 
            overflow-y: auto; 
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-right: 5px;
            margin-bottom: 15px;
            scroll-behavior: smooth;
        }
        #chat-box::-webkit-scrollbar { width: 4px; }
        #chat-box::-webkit-scrollbar-thumb { background: var(--secondary); border-radius: 10px; }

        .msg { 
            padding: 12px 16px; 
            border-radius: 18px; 
            font-size: 14px;
            max-width: 80%;
            word-wrap: break-word;
            animation: slideIn 0.3s ease-out forwards;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .msg-you {
            align-self: flex-end;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-bottom-right-radius: 4px;
            color: #fff;
        }

        .msg-friend {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255,255,255,0.05);
            border-bottom-left-radius: 4px;
        }

        .msg-system {
            align-self: center;
            background: rgba(0, 0, 0, 0.3);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            color: #94A3B8;
            font-size: 12px;
            padding: 6px 12px;
            border-radius: 8px;
            box-shadow: none;
            max-width: 90%;
            text-align: center;
        }

        .msg img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 5px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .msg img:hover { transform: scale(1.02); }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px 16px;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            margin-top: -5px;
        }
        .typing-indicator span {
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--accent);
            border-radius: 50%;
            margin: 0 2px;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Controls */
        .chat-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--accent);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 18px;
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .icon-btn:hover { background: rgba(6, 182, 212, 0.2); }
        
        .icon-btn.send {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
        }

        /* Modals */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .call-modal {
            background: var(--glass-bg);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--primary);
            animation: pulse-modal 2s infinite;
        }
        @keyframes pulse-modal {
            0% { box-shadow: 0 0 0 0 rgba(255, 64, 129, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(255, 64, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 64, 129, 0); }
        }

        .call-modal h3 { margin: 0 0 20px 0; font-size: 20px; }
        .call-actions { display: flex; gap: 15px; justify-content: center; }
        .btn-accept { background: #10B981; border: none; padding: 10px 20px; border-radius: 10px; color: white; cursor: pointer;}
        .btn-decline { background: #EF4444; border: none; padding: 10px 20px; border-radius: 10px; color: white; cursor: pointer;}

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
        }
        .close-img {
            position: absolute;
            top: 20px; right: 30px;
            font-size: 40px; color: white; cursor: pointer;
        }

        /* --- WHATSAPP STYLE VIDEO SECTION --- */
        #video-section { 
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 2000; /* Stays on top of everything */
        }
        
        #remote-video { 
            width: 100%;
            height: 100%;
            object-fit: cover; /* Fill the whole screen */
        }

        #local-video { 
            position: absolute;
            bottom: 40px;
            right: 20px;
            width: 120px;
            height: 160px;
            border-radius: 16px;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            z-index: 2001;
            background: #222;
        }

        .btn-end-call {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: #EF4444;
            color: white;
            border: none;
            padding: 15px 35px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(239, 68, 68, 0.5);
            z-index: 2002;
            transition: all 0.2s;
        }

        .btn-end-call:hover {
            background: #DC2626;
            transform: translateX(-50%) translateY(-2px);
        }

    </style>
</head>
<body>

    <!-- Universal Background Watermark -->
    <div class="watermark">y@$h</div>

    <div class="glass-container">
        <h2>ChatingFly ✨</h2>

        <div id="setup">
            <input type="text" id="my-id" placeholder="Create your ID (e.g. yash123)">
            <button class="primary-btn" onclick="startNode()">Go Online</button>
        </div>

        <div id="connect-section" style="display:none;">
            <input type="text" id="friend-id" placeholder="Friend's ID">
            <button class="primary-btn" onclick="connectToFriend()">Connect via P2P</button>
        </div>

        <div id="chat-section" style="display:none;">
            <!-- Active Header -->
            <div class="chat-header">
                <div class="user-info">
                    <div class="avatar" id="friend-avatar">? <div class="status-dot" id="status-indicator"></div></div>
                    <div>
                        <div style="font-weight: 600; font-size: 14px;" id="friend-name-display">Connected</div>
                        <div class="conn-quality" id="signal-quality">📊 Signal: Good</div>
                    </div>
                </div>
                <button class="icon-btn" onclick="startVideoCall()" title="Video Call">📞</button>
            </div>

            <div id="chat-box"></div>
            
            <div class="typing-indicator" id="typing-indicator">
                <span></span><span></span><span></span>
            </div>

            <div class="chat-controls">
                <button class="icon-btn" onclick="document.getElementById('file-input').click()">🖼️</button>
                <input type="file" id="file-input" style="display:none" onchange="sendFile(this)" accept="image/*">
                
                <input type="text" id="msg-input" placeholder="Type a message..." style="margin:0;" 
                       oninput="sendTyping()" onkeypress="if(event.key === 'Enter') sendMessage()">
                
                <button class="icon-btn send" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Fullscreen Video Section (WhatsApp Style) -->
    <div id="video-section">
        <video id="remote-video" autoplay playsinline></video>
        <video id="local-video" autoplay muted playsinline></video>
        <button class="btn-end-call" onclick="endCall()">End Call</button>
    </div>

    <!-- Incoming Call Modal -->
    <div class="overlay" id="call-modal">
        <div class="call-modal">
            <h3>📞 Incoming Call...</h3>
            <div class="call-actions">
                <button class="btn-accept" onclick="acceptCall()">Accept</button>
                <button class="btn-decline" onclick="declineCall()">Decline</button>
            </div>
        </div>
    </div>

    <!-- Image Viewer Modal -->
    <div class="overlay image-modal" id="image-modal" onclick="this.style.display='none'">
        <span class="close-img">&times;</span>
        <img id="full-image" src="" alt="Full Screen">
    </div>

    <script>
        let peer = null;
        let conn = null;
        let incomingCallObj = null;
        let localStream = null;
        let typingTimeout = null;
        let activeCall = null;

        // Sound Engine (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playPopSound() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function startNode() {
            const id = document.getElementById('my-id').value.trim();
            if (!id) return;
            peer = new Peer(id);
            peer.on('open', () => {
                document.getElementById('setup').style.display = 'none';
                document.getElementById('connect-section').style.display = 'block';
            });
            peer.on('connection', c => setupConnection(c));
            peer.on('call', call => {
                incomingCallObj = call;
                document.getElementById('call-modal').style.display = 'flex';
            });
        }

        function connectToFriend() {
            const fid = document.getElementById('friend-id').value.trim();
            if (!fid) return;
            setupConnection(peer.connect(fid, { reliable: true }));
        }

        function setupConnection(c) {
            conn = c;
            conn.on('open', () => {
                document.getElementById('connect-section').style.display = 'none';
                document.getElementById('chat-section').style.display = 'block';
                document.getElementById('friend-name-display').textContent = conn.peer;
                
                document.getElementById('status-indicator').classList.remove('offline');
                document.getElementById('signal-quality').textContent = "📊 Signal: Good";
                
                document.getElementById('friend-avatar').innerHTML = conn.peer.charAt(0).toUpperCase() + '<div class="status-dot" id="status-indicator"></div>';
                
                confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#FF4081', '#7C3AED', '#06B6D4'] });
            });

            conn.on('data', data => {
                if (data.type === 'text') {
                    hideTyping();
                    renderMsg(data.text, 'friend');
                    playPopSound();
                } else if (data.type === 'image') {
                    hideTyping();
                    renderImgMsg(data.img, 'friend');
                    playPopSound();
                } else if (data.type === 'typing') {
                    showTyping();
                }
            });

            conn.on('close', () => handleOffline());
            conn.on('error', () => handleOffline());
        }

        function handleOffline() {
            document.getElementById('friend-name-display').textContent = 'Offline';
            document.getElementById('signal-quality').textContent = "❌ Connection Lost";
            
            const dot = document.getElementById('status-indicator');
            if (dot) {
                dot.classList.add('offline');
            }

            hideTyping();
            renderMsg('Connection closed. User went offline.', 'system');
            
            // Automatically end call if friend goes offline
            endCall();
        }

        // Messaging
        function sendMessage() {
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !conn) return;
            
            if (conn.open) {
                conn.send({ type: 'text', text: text });
                renderMsg(text, 'you');
                input.value = '';
            } else {
                renderMsg("Message failed: User is offline.", "system");
            }
        }

        function sendFile(input) {
            const file = input.files[0];
            if (!file || !conn) return;
            
            if (conn.open) {
                const reader = new FileReader();
                reader.onload = e => {
                    conn.send({ type: 'image', img: e.target.result });
                    renderImgMsg(e.target.result, 'you');
                };
                reader.readAsDataURL(file);
            } else {
                renderMsg("File transfer failed: User is offline.", "system");
            }
        }

        // Typing Indicator Logic
        function sendTyping() {
            if (conn && conn.open) conn.send({ type: 'typing' });
        }
        function showTyping() {
            const ind = document.getElementById('typing-indicator');
            ind.style.display = 'block';
            document.getElementById('chat-box').appendChild(ind);
            document.getElementById('chat-box').scrollTop = 9999;
            clearTimeout(typingTimeout);
            typingTimeout = setTimeout(hideTyping, 2000);
        }
        function hideTyping() {
            document.getElementById('typing-indicator').style.display = 'none';
        }

        // Rendering UI
        function renderMsg(text, sender) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg msg-${sender}`;
            div.textContent = text;
            box.insertBefore(div, document.getElementById('typing-indicator'));
            box.scrollTop = box.scrollHeight;
        }

        function renderImgMsg(src, sender) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg msg-${sender}`;
            const img = document.createElement('img');
            img.src = src;
            img.onclick = () => openImage(src);
            div.appendChild(img);
            box.insertBefore(div, document.getElementById('typing-indicator'));
            box.scrollTop = box.scrollHeight;
        }

        function openImage(src) {
            document.getElementById('full-image').src = src;
            document.getElementById('image-modal').style.display = 'flex';
        }

        // Call Logic (WhatsApp Style)
        async function startVideoCall() {
            if (!conn || !conn.open) {
                renderMsg("Cannot call: User is offline.", "system");
                return;
            }
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('local-video').srcObject = localStream;
            document.getElementById('video-section').style.display = 'block'; // Show Fullscreen
            
            activeCall = peer.call(conn.peer, localStream);
            handleCall(activeCall);
        }

        async function acceptCall() {
            document.getElementById('call-modal').style.display = 'none';
            localStream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
            document.getElementById('local-video').srcObject = localStream;
            document.getElementById('video-section').style.display = 'block'; // Show Fullscreen
            
            activeCall = incomingCallObj;
            activeCall.answer(localStream);
            handleCall(activeCall);
        }

        function declineCall() {
            document.getElementById('call-modal').style.display = 'none';
            if (incomingCallObj) incomingCallObj.close();
        }

        function handleCall(call) {
            call.on('stream', stream => {
                document.getElementById('remote-video').srcObject = stream;
            });
            call.on('close', () => {
                endCall();
            });
        }

        // Safely end the call and hide video UI
        function endCall() {
            if (activeCall) {
                activeCall.close();
                activeCall = null;
            }
            if (localStream) {
                localStream.getTracks().forEach(track => track.stop());
                localStream = null;
            }
            document.getElementById('video-section').style.display = 'none';
        }
    </script>
</body>
</html>
